name: Evaluate Review Experiments

# Runs on a SELF-HOSTED runner installed on the user's local Windows machine,
# using their existing OAuth-authenticated Claude Code (Max subscription).
# Zero pay-per-token API key needed. See .github/WORKFLOW_SETUP.md for runner
# install instructions.
#
# Rollback: if you want to switch to the cloud runner + ANTHROPIC_API_KEY
# pattern instead, see .github/disabled/workflows/evaluate-cloud-fallback.yml
# and .github/disabled/WORKFLOW_SETUP_CLOUD.md.
#
# Required GitHub repo secret:
#   IQ_API_KEY  — Groupon IQ personal token. Copy from local
#                 ~/.claude/settings.json env.IQ_API_KEY.

on:
  schedule:
    # Mon, Wed, Fri at 11:00 UTC.
    - cron: '0 11 * * 1,3,5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Orchestrator mode (auto | explicit <name> | since YYYY-MM-DD)'
        required: false
        default: 'auto'

permissions:
  contents: read

concurrency:
  group: evaluate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: [self-hosted, windows]
    timeout-minutes: 120
    defaults:
      run:
        # Git Bash on Windows — all paths use POSIX form.
        shell: bash

    env:
      # Hardcoded for THIS user's machine. If moving to a different host,
      # update these two paths.
      WORKSPACE_DIR: /c/Users/miro/CoS
      PLUGIN_DIR: /c/Users/miro/.claude/plugins/local-marketplaces/miro-personal/plugins/experiment-evaluation-orchestrator

    steps:
      - name: Sanity check — tooling on PATH
        run: |
          set -euo pipefail
          for tool in claude bq curl jq python git; do
            if command -v "$tool" >/dev/null; then
              echo "[ok] $tool → $(command -v "$tool")"
            else
              echo "::error::Missing tool on runner PATH: $tool"
              exit 1
            fi
          done
          echo ""
          claude --version
          bq version 2>&1 | head -1

      - name: Update plugin from origin/main (if clean working tree)
        # Pull the latest plugin code into the live install location so the
        # orchestrator runs against latest. If there are uncommitted local
        # changes (the user is mid-edit), skip the reset and warn — don't
        # silently overwrite work.
        run: |
          set -euo pipefail
          cd "$PLUGIN_DIR"
          git fetch origin main
          if git diff --quiet && git diff --staged --quiet; then
            git reset --hard origin/main
            echo "Plugin updated: $(git log -1 --oneline)"
          else
            echo "::warning::Uncommitted changes in $PLUGIN_DIR — using current state instead of latest origin/main"
            git status --short
          fi

      - name: Run orchestrator (uses local Claude Code OAuth login)
        env:
          MODE: ${{ inputs.mode || 'auto' }}
          # Intentionally NOT setting ANTHROPIC_API_KEY — local Claude Code
          # is authenticated via OAuth (Max). Setting an API key here would
          # OVERRIDE OAuth and switch to pay-per-token billing.
          # Intentionally NOT setting IQ_API_KEY for the Claude run — the
          # orchestrator's Step 11 would try MCP-based publish and fail in
          # headless mode; the next workflow step does pure-curl publish
          # using the repo secret instead.
        run: |
          set -euo pipefail
          cd "$WORKSPACE_DIR"
          mkdir -p temp/experiment-evaluation
          # Local Claude Code resolves plugins from ~/.claude/plugins/ and
          # picks up CLAUDE.md from the workspace dir automatically. Slash
          # commands work because we're running the same `claude` binary
          # the user uses interactively.
          claude --print "/experiment-evaluation-orchestrator:evaluate-reviews-experiments ${MODE}"

      - name: Locate run_dir
        id: run_dir
        run: |
          set -euo pipefail
          RUN_DIR=$(find "$WORKSPACE_DIR/temp/experiment-evaluation" -maxdepth 1 -mindepth 1 -type d -printf '%T@ %p\n' | sort -n | tail -1 | cut -d' ' -f2-)
          if [[ -z "$RUN_DIR" || ! -f "$RUN_DIR/combined_report.html" ]]; then
            echo "::error::No combined_report.html found under $WORKSPACE_DIR/temp/experiment-evaluation"
            ls -la "$WORKSPACE_DIR/temp/experiment-evaluation/" || true
            exit 1
          fi
          echo "run_dir=$RUN_DIR" >> "$GITHUB_OUTPUT"
          echo "Located: $RUN_DIR"
          ls -la "$RUN_DIR"

      - name: Publish to Groupon IQ (pure curl, no MCP)
        env:
          IQ_API_KEY: ${{ secrets.IQ_API_KEY }}
          RUN_DIR: ${{ steps.run_dir.outputs.run_dir }}
        run: bash "$PLUGIN_DIR/.github/scripts/publish-to-iq.sh"

      - name: Upload combined report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-report-${{ github.run_id }}
          path: |
            /c/Users/miro/CoS/temp/experiment-evaluation/*/combined_report.html
            /c/Users/miro/CoS/temp/experiment-evaluation/*/summary.md
            /c/Users/miro/CoS/temp/experiment-evaluation/*/passthrough/*.docx
          retention-days: 30
